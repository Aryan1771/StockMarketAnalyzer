name: Keep Render Backend Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          DEFAULT_HEALTHCHECK_URL: https://stockmarketanalyzer2-0.onrender.com/api/health
          OVERRIDE_HEALTHCHECK_URL: ${{ vars.RENDER_HEALTHCHECK_URL }}
        run: |
          TARGET_URL="${OVERRIDE_HEALTHCHECK_URL:-$DEFAULT_HEALTHCHECK_URL}"
          echo "Pinging $TARGET_URL"
          curl --fail --show-error --silent --max-time 30 "$TARGET_URL"
